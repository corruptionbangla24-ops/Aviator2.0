<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETLOVER24 Aviator</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #111;
            --green: #28a745;
            --yellow: #ffc107;
            --red: #ff0044;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: Arial, sans-serif;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 10px 15px;
            border-bottom: 1px solid #222;
        }
        .navbar-brand b { color: var(--red); font-size: 20px; }
        .navbar-brand span { font-size: 12px; color: #aaa; display: block; }
        .balance-display {
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--green);
            display: none !important;

            font-weight: bold;
        }
        .container { padding: 15px; }
        
        /* প্রফেশনাল ক্রাশ হিস্টোরি বক্স ডিজাইন */
        #history-box {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 6px;
            background: #090909;
            border-radius: 6px;
            border: 1px solid #1c1c1c;
            min-height: 24px;
            align-items: center;
        }
        .history-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        #game-box {
            position: relative;
            background: #050505;
            border-radius: 10px;
            height: 200px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #multiplier {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .bet-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #222;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .active-tab { background: #333; font-weight: bold; border: 1px solid #555; }
        .panel-layout { display: flex; gap: 15px; align-items: center; }
        .amount-section { flex: 1; }
        .input-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 5px;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .input-box button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 30px;
            cursor: pointer;
        }
        .input-box b { font-size: 18px; }
        .grid-btns { display: flex; gap: 5px; }
        .q-btn {
            flex: 1;
            background: #222;
            border: none;
            color: #fff;
            padding: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .main-btn {
            width: 120px;
            height: 75px;
            background: var(--green);
            color: #fff;
            border: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-btn.cashout { background: var(--yellow); color: #000; }
        .auto-settings {
            display: grid;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
         }
        .auto-row { display: flex; justify-content: space-between; align-items: center; }
        .toggle {
            width: 34px;
            height: 18px;
            background: #444;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle.on { background: var(--green); }
        .toggle.on::after { left: 18px; }
        .val-box {
            background: #000;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid #333;
            cursor: pointer;
        }
        .live-bets { margin-top: 20px; background: #0a0a0a; border-radius: 10px; padding: 10px; }
        .bet-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .bet-table th { text-align: left; color: #777; padding: 8px; border-bottom: 1px solid #222; }
        .bet-table td { padding: 8px; border-bottom: 1px solid #111; }
       
#toggle-autobet, #toggle-autocash, .toggle, .toggle-bg {
    pointer-events: auto !important;
    cursor: pointer !important;
}
 
    </style>
    <script src="/socket.io/socket.io.js?v=1.2"></script>
</head>
<body>

    <audio id="s-click" src="click.mp3" preload="auto"></audio>
    <audio id="s-fly" src="helicopter.mp3" preload="auto" loop></audio>
    <audio id="s-crash" src="crash.mp3" preload="auto"></audio>

    <nav>
        <div class="navbar-brand">
            <b>BETLOVER24</b>
            <span>Aviator</span>
        </div>
        

    </nav>

    <div class="container">
        
        <!-- ১. গেম বক্সের ঠিক ওপরে লাইভ হিস্টোরি কন্টেইনার -->
        <div id="history-box"></div>

        <div id="game-box">
            <canvas id="canvas"></canvas>
            
<div id="multiplier">1.00x</div>
<div id="game-timer" style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; color: #ffcc00; display: none; text-shadow: 0 0 8px rgba(255,204,0,0.5);">Next Round In 8.00s</div>

        </div>

        <div class="bet-card" id="p1">
            <div class="tabs">
                <div class="tab active-tab" id="tab-bet" onclick="toggleTab('bet')">Bet</div>
                <div class="tab" id="tab-auto" onclick="toggleTab('auto')">Auto</div>
            </div>
            <div class="panel-layout">
                            <div class="amount-section" style="width: 100%; max-width: 320px; margin: 0 auto; font-family: sans-serif;">
                <!-- 🎯 ১. ওপরের মেইন বক্স: বামে প্লাস, ডানে মাইনাস, মাঝে অ্যামাউন্ট -->
                <div class="input-box" style="display: flex; background: #141516; border: 1px solid #2c2d30; border-radius: 8px; overflow: hidden; margin-bottom: 8px; height: 40px; align-items: center;">
                    <button onclick="changeAmt(50)" style="flex: 1; background: transparent; color: #fff; border: none; font-size: 22px; font-weight: bold; cursor: pointer; height: 100%;">+</button>
                    <b id="amt-1" style="flex: 2; color: #fff; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; background: #000; height: 100%;">100</b>
                    <button onclick="changeAmt(-50)" style="flex: 1; background: transparent; color: #fff; border: none; font-size: 22px; font-weight: bold; cursor: pointer; height: 100%;">-</button>
                </div>
                
                <!-- 🎯 ২. নিচের ৮টি কুইক রেডিমেড বাটন গ্রিড (৪টি করে ২ লাইনে) -->
                <div class="grid-btns" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                    <button class="q-btn" onclick="setAmt(50)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">50</button>
                    <button class="q-btn" onclick="setAmt(100)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">100</button>
                    <button class="q-btn" onclick="setAmt(500)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">500</button>
                    <button class="q-btn" onclick="setAmt(1000)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">1000</button>
                    <button class="q-btn" onclick="setAmt(2000)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">2000</button>
                    <button class="q-btn" onclick="setAmt(3000)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">3000</button>
                    <button class="q-btn" onclick="setAmt(5000)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">5000</button>
                    <button class="q-btn" onclick="setAmt(10000)" style="background: #1c1d20; color: #fff; border: 1px solid #2c2d30; border-radius: 6px; padding: 6px 0; font-weight: bold; font-size: 12px; cursor: pointer;">10000</button>
                </div>
            </div>

                <button class="main-btn" id="btn-1" onclick="handleAction('manual')">BET</button>
            </div>
            
            <div id="auto-settings-panel" class="auto-settings" style="display: none;">
                <div class="auto-row">
                    <span>Auto Bet</span>
                   <div class="toggle" id="toggle-autobet" onclick="toggleAutoBet(this)"></div>
 
                </div>
                <div class="auto-row">
                    <span>Auto Cashout</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="toggle" id="toggle-autocash" onclick="toggleAutoCashout(this)"></div>

     <!-- 🎯 ২৬৩ নম্বর লাইন ফিক্সড: contenteditable="true" যোগ করায় এখন বক্সে টাচ করলেই এডিট করার জন্য কিবোর্ড ওপেন হবে -->
<div class="val-box" id="auto-val-1" contenteditable="true" oninput="setAutoValue()" onclick="setAutoValue()" style="outline: none; min-width: 60px; text-align: center;">2.00</div>
                   
                    </div>
                </div>
            </div>
        </div>

        <div class="live-bets">
            <table class="bet-table">
                <thead>
                    <tr><th>PLAYER</th><th>BET BDT</th><th>WIN BDT</th></tr>
                </thead>
                <tbody id="player-list">
                    <tr><td>User_421</td><td>100.00</td><td>-</td></tr>
                    <tr><td>Aviator_Pro</td><td>500.00</td><td>1250.00</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
<script>
// 🎰 গেম কোর ও ক্যানভাস মোশন ভেরিয়েবল
const socket = io(); 
let isBetting = false;
let isCrashed = false;
let currentMultiplier = 1.00;

const canvas = document.getElementById('game-canvas') || document.querySelector('canvas') || document.getElementsByTagName('canvas');
const ctx = canvas ? canvas.getContext('2d') : null;

// 🖼️ ইমেজ সোর্স লোডার
const planeImg = new Image(); planeImg.src = 'helicopter.png'; 
const blastImg = new Image(); blastImg.src = 'explosion.png'; 

// 🎯 সাউন্ড ইঞ্জিন ফিক্সড: আপনার গিটহাবের আসল ফাইলের নামের সাথে হুবহু মিল করা হলো
const betSound = new Audio('click.mp3');       
const flySound = new Audio('helicopter.mp3');  // 🛫 flying.mp3 কেটে আপনার helicopter.mp3 করা হলো
const crashSound = new Audio('crash.mp3');     // 💥 explosion.mp3 কেটে আপনার crash.mp3 করা হলো

flySound.loop = true; // ওড়ার সাউন্ড অনবরত লুপে বাজবে

const urlParams = new URLSearchParams(window.location.search);
const urlUserId = urlParams.get('userId') || urlParams.get('username') || "Roky123";
const urlWallet = urlParams.get('wallet') || "main";

// ক্যানভাস বাউন্ডারি এবং কার্ভ ট্র্যাকিং ভেরিয়েবল
let planeX = 0;
let planeY = canvas ? canvas.height : 200;
let shakeTime = 0; 

function drawGame() {
    if (!ctx || !canvas) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const startX = 5;                        
    const startY = canvas.height - 5;        
    const endX = canvas.width - 95;          
    const endY = 65;                         
    
    let progress = Math.min(1, (currentMultiplier - 1.00) / 1.35); 
    
    if (!isCrashed) {
        planeX = startX + (endX - startX) * progress;
        planeY = startY - (startY - endY) * Math.pow(progress, 1.2); 
        
        ctx.beginPath();
        ctx.strokeStyle = '#ff003f'; 
        ctx.lineWidth = 5;           
        ctx.moveTo(startX, startY);
        
        for (let i = 0; i <= progress * 100; i++) {
            let t = i / 100;
            let lx = startX + (endX - startX) * t;
            let ly = startY - (startY - endY) * Math.pow(t, 1.2);
            ctx.lineTo(lx, ly);
        }
        ctx.stroke();
        
        ctx.drawImage(planeImg, planeX - 52, planeY - 40, 85, 55);
    } else {
        ctx.save();
        if (shakeTime > 0) {
            let dx = (Math.random() - 0.5) * 6;
            let dy = (Math.random() - 0.5) * 6;
            ctx.translate(dx, dy);
            shakeTime--;
        }
        ctx.drawImage(blastImg, planeX - 45, planeY - 45, 100, 100);
        ctx.restore();
    }
    requestAnimationFrame(drawGame);
}

// index.html এর handleAction ফাংশনটি হুবহু এটি দিয়ে প্রতিস্থাপন করুন:

async function handleAction() {
    // 🛡️ লুপ প্রোটেকশন চেক: যদি অলরেডি বাজি প্রসেস চলে, তবে কোনো রিকোয়েস্ট বা ২য় সাউন্ড ট্রিগার হবে না
    if (window.isProcessingBet) return;
    window.isProcessingBet = true; // লক কঠোরভাবে অন করা হলো

    const btn = document.getElementById('btn-1') || document.getElementById('btn-2') || document.querySelector('.bet-btn') || document.querySelector('button');
    const amtLabel = document.getElementById('amt-1') || document.querySelector('.amount-text');
    const currentBetAmount = parseInt(amtLabel.innerText) || 100;

    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('userId') || urlParams.get('username') || "";
    const urlWallet = urlParams.get('wallet') || "main";

    if (!urlUserId) {
        window.isProcessingBet = false;
        return;
    }

    if (!isBetting) {
        // 🔊 বাজি ধরার প্রথম ম্যানুয়াল ক্লিকেই কেবল সাউন্ড বাজবে
        try { betSound.play(); } catch(e){}
        
        try {
            const res = await fetch('/api/place-bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: currentBetAmount, userId: urlUserId, wallet: urlWallet })
            });
            const data = await res.json();
            
            if (data.success) {
                isBetting = true;
                if (btn) {
                    btn.innerText = "CASH OUT";
                    btn.classList.add('cashout');
                }
                // জিতার পর ক্যাশআউটের জন্য বাটনটি আনলক করা হলো
                setTimeout(() => { window.isProcessingBet = false; }, 200);
                
                if (window.parent) { 
                    window.parent.postMessage({ action: "refresh_wallet" }, "*"); 
                }
            } else {
                window.isProcessingBet = false;
                console.log(data.message || "Bet Declined!");
            }
        } catch (e) { 
            window.isProcessingBet = false;
            console.error("Server Error!"); 
        }
           } else {
        // 🎯 ডাইনামিক ইভেন্ট পাসার: যদি প্লেয়ার হাত দিয়ে স্ক্রিনে চাপ দেয় (অটো-ক্যাশআউট ছাড়াই), কেবল তখনই ম্যানুয়াল ক্লিক কার্যকর হবে। অটো লুপের সিগন্যালকে এটি বিন্দুমাত্র ব্লক করবে না।
        if (window.isAutoCashoutEnabled && typeof arguments[0] !== 'undefined' && arguments[0] === 'manual') {
            return; 
        }

        try {
            const targetBtn = btn || document.getElementById('btn-1') || document.getElementById('btn-2') || document.querySelector('.bet-btn') || document.querySelector('.cashout-btn');

            const freshParams = new URLSearchParams(window.location.search);
            const freshUserId = freshParams.get('userId') || freshParams.get('username') || urlUserId;
            const freshWallet = freshParams.get('wallet') || urlWallet;

            try { betSound.play(); } catch(e){}

            const res = await fetch('/api/cash-out', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: freshUserId, amount: currentBetAmount, wallet: freshWallet })
            });
            const data = await res.json();
            
            window.isProcessingBet = false; 
            
            if (data.success) {
                isBetting = false;
                if (targetBtn) {
                    targetBtn.innerText = "BET";
                    targetBtn.style.setProperty('background-color', '#28a745', 'important');
                    targetBtn.style.setProperty('background', '#28a745', 'important');
                }
                
                // 🎯 লাইভ ওয়ালেট সিঙ্ক ফিক্সড: এটি ক্যাশআউট হওয়ার ১ মিলি-সেকেন্ডে মেইন সাইটের ব্যালেন্স বার সাথে সাথে প্লাস করে দেবে
                if (window.parent) { 
                    window.parent.postMessage({ action: "refresh_wallet" }, "*"); 
                }
            }
        } catch (e) { 
            window.isProcessingBet = false; 
            console.error(e); 
        }
    }
     
}
function setAmt(val) { 
    const amtLabel = document.getElementById('amt-1') || document.querySelector('.amount-text');
    if(amtLabel) amtLabel.innerText = val; 
}
// index.html এর changeAmt ফাংশনটি হুবহু এটি দিয়ে প্রতিস্থাপন করুন:

function changeAmt(diff) {
    const amtLabel = document.getElementById('amt-1') || document.querySelector('.amount-text');
    if (amtLabel) {
        let current = parseInt(amtLabel.innerText) || 100;
        
        // 🎯 ১০ টাকা করে কমাবাড়ার লজিক:
        // diff-এর মান পজিটিভ হলে ১০ যোগ হবে, নেগেটিভ হলে ১০ বিয়োগ হবে
        let step = (diff > 0) ? 10 : -10;
        
        // সর্বনিম্ন বাজি ১০ টাকা লক করা হলো (যাতে ০ বা মাইনাস না হতে পারে)
        amtLabel.innerText = Math.max(10, current + step);
    }
}

// 🎯 ৪৭১ নম্বর লাইনে হুবহু এই কোডটুকু পেস্ট করুন

window.isAutoBetEnabled = false;
window.isAutoCashoutEnabled = false;
window.autoCashoutMultiplier = 2.00;

function toggleAutoBet(element) {
    window.isAutoBetEnabled = !window.isAutoBetEnabled;
    if (element) {
        element.classList.toggle('active', window.isAutoBetEnabled);
        element.style.background = window.isAutoBetEnabled ? '#00ff88' : '#1c1d20';
    }
}

function toggleAutoCashout(element) {
    window.isAutoCashoutEnabled = !window.isAutoCashoutEnabled;
    if (element) {
        element.classList.toggle('active', window.isAutoCashoutEnabled);
        element.style.background = window.isAutoCashoutEnabled ? '#ff003f' : '#1c1d20';
    }
    // 🎯 ডাইনামিক লাইভ ফিক্স: বাটন অন করার সাথে সাথে এটি ইনস্ট্যান্ট মান রিড করবে
    updateLiveAutoMultiplier();
}

// 🎯 ইউনিভার্সাল অটো-ক্যাশআউট ভ্যালু ট্র্যাকার (যা গেমের যেকোনো মুহূর্তে লাইভ মান রিড করতে সক্ষম)
function updateLiveAutoMultiplier() {
    const targetValBox = document.getElementById('auto-val-1') || document.querySelector('.val-box') || document.getElementById('auto-multiplier-input');
    if (targetValBox) {
        let textVal = targetValBox.innerText || targetValBox.value || "2.00";
        let cleanNum = parseFloat(textVal.replace(/[^\d.]/g, '')); 
        window.autoCashoutMultiplier = isNaN(cleanNum) ? 2.00 : cleanNum;
    }
}

function setAutoValue() {
    const targetValBox = document.getElementById('auto-val-1') || document.querySelector('.val-box');
    if (targetValBox) {
        let textVal = targetValBox.innerText || targetValBox.value || "2.00";
        let cleanNum = parseFloat(textVal.replace(/[^\d.]/g, '')); 
        window.autoCashoutMultiplier = isNaN(cleanNum) ? 2.00 : cleanNum;
        console.log("🎯 লাইভ অটো ভ্যালু সিঙ্ক: " + window.autoCashoutMultiplier);
    }
}

socket.on("gameTimer", (timer) => {
    if (timer === 5) { window.autoCashoutTriggered = false; window.isProcessingBet = false; }
    
    // 🎯 অটো-বেট ওয়ালেট লক: টাইমার ২ সেকেন্ডে আসার সাথে সাথে ইউজার আইডির পাশাপাশি ওয়ালেট ডেটাও নিখুঁতভাবে পাস করবে
    if (timer === 2 && window.isAutoBetEnabled && !isBetting && !isCrashed) {
        const urlParams = new URLSearchParams(window.location.search);
        // মেইন সাইটের ক্যাসিনো থিমের ডিজাইন অনুযায়ী ওয়ালেট প্যারামিটারটি রিড করা হচ্ছে
        window.urlWallet = urlParams.get('wallet') || "main"; 
        handleAction(); // স্বয়ংক্রিয় বাজি প্লেস ফাংশন কল
    }
});



function toggleTab(type) {
    const autoPanel = document.getElementById('auto-settings-panel');
    const tabBet = document.getElementById('tab-bet');
    const tabAuto = document.getElementById('tab-auto');
    if(tabBet) tabBet.classList.toggle('active-tab', type === 'bet');
    if(tabAuto) tabAuto.classList.toggle('active-tab', type === 'auto');
    if(autoPanel) autoPanel.style.display = (type === 'bet') ? 'none' : 'flex';
}


// index.html এর একদম নিচে থাকা সকেট লিসেনারটি হুবহু এটি দিয়ে প্রতিস্থাপন করুন:

// 📊 লাইভ সকেট গেম আপডেট ও ডাইনামিক হিস্ট্রি লিসেনার
socket.on("gameUpdate", (data) => {
    // ১. মেইন মাল্টিপ্লায়ার টেক্সট আপডেট
    const multLabel = document.getElementById("multiplier-text") || document.getElementById("multiplier") || document.querySelector('.multiplier');
    if (multLabel && data.multiplier) {
        multLabel.innerText = data.multiplier + "x";
        currentMultiplier = parseFloat(data.multiplier);
    }
           
            if (window.isAutoCashoutEnabled && isBetting && !isCrashed) {
            // 🎯 বাউন্ডারি ফিক্সড: এটি কঠোরভাবে শুধুমাত্র 'auto-val-1' বক্সের ভেতরকার ২.০০ মানটিই রিড করবে
            const targetValBox = document.getElementById('auto-val-1') || document.querySelector('.val-box');
            if (targetValBox) {
                let textVal = targetValBox.innerText || targetValBox.value || "2.00";
                let cleanNum = parseFloat(textVal.replace(/[^\d.]/g, '')); 
                if (!isNaN(cleanNum) && cleanNum > 1.01 && cleanNum < 100) {
                    window.autoCashoutMultiplier = cleanNum;
                }
            }
            
            // 🛡️ সেলফ-রিসেটিং অটো লক: ডুপ্লিকেট হিটও ব্লক করবে আবার ১ মিলি-সেকেন্ডে নিখুঁতভাবে অটো-ক্যাশআউট সচল রাখবে
            if (currentMultiplier >= window.autoCashoutMultiplier) {
                if (typeof window.autoCashoutTriggered === 'undefined' || !window.autoCashoutTriggered) {
                    window.autoCashoutTriggered = true; // রাউন্ডে কেবল একবারই ফায়ার হওয়া নিশ্চিত করবে
                    handleAction(); 
                }
            }
        }
   
  
    // 🎯 ২. বেট হিস্ট্রি বাবল রেন্ডারার (আপনার স্ক্রিনশটের ২১২ লাইনের 'history-box' আইডিতে সরাসরি কানেক্ট করা হলো)
    const historyContainer = document.getElementById("history-box");
    if (historyContainer && data.history && Array.isArray(data.history)) {
        historyContainer.innerHTML = ""; // পুরানো বাবল ক্লিয়ার করা হলো
        
        // ব্যাকঅ্যান্ড থেকে আসা শেষ ১০টি ক্রাশ পয়েন্টকে সুন্দর রঙিন বাবলে রূপান্তর
        data.history.slice(0, 10).forEach(val => {
            const bubble = document.createElement("span");
            bubble.innerText = val + "x";
            
            // অফিশিয়াল এভিয়েটরের মতো মাল্টিপ্লায়ার অনুযায়ী এক্সক্লুসিভ কালার ও প্রিমিয়াম ডিজাইন
            let num = parseFloat(val);
            if (num < 1.20) {
                bubble.style.cssText = "background: #1e293b; color: #38bdf8; border: 1px solid #0369a1; padding: 4px 10px; margin: 0 4px; border-radius: 20px; font-weight: bold; font-size: 11px; font-family: sans-serif; display: inline-block;";
            } else if (num < 2.00) {
                bubble.style.cssText = "background: #2e1065; color: #c084fc; border: 1px solid #6b21a8; padding: 4px 10px; margin: 0 4px; border-radius: 20px; font-weight: bold; font-size: 11px; font-family: sans-serif; display: inline-block;";
            } else {
                bubble.style.cssText = "background: #881337; color: #fb7185; border: 1px solid #9f1239; padding: 4px 10px; margin: 0 4px; border-radius: 20px; font-weight: bold; font-size: 11px; font-family: sans-serif; display: inline-block;";
            }
            historyContainer.appendChild(bubble);
        });
    }

    // সাউন্ড ও রিসেট প্রোটোকল
    if (data.is_crashed === 0) {
        isCrashed = false; 
        if (currentMultiplier > 1.01) { try { flySound.play(); } catch(e){} }
    } else if (data.is_crashed === 1) {
        if (!isCrashed) {
            isCrashed = true;
            shakeTime = 15; 
            try { flySound.pause(); flySound.currentTime = 0; crashSound.play(); } catch(e){}
        }
        isBetting = false;
        const btn = document.getElementById('btn-1') || document.querySelector('.bet-btn');
        if (btn) { btn.innerText = "BET"; btn.classList.remove('cashout'); }
        window.isProcessingBet = false;
    }
});

if (canvas) {
    planeImg.onload = () => { drawGame(); };
}
</script>
