<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Professional with Menu</title>
    <style>
        :root { --bg: #000; --panel: #1b1b1b; --green: #28a745; --yellow: #ffc107; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* প্রফেশনাল মেনুবার */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px 15px; border-bottom: 1px solid #282828; position: sticky; top: 0; z-index: 100; }
        .logo-box { line-height: 1; }
        .logo-box b { color: #e11d48; font-size: 16px; }
        .logo-box span { font-size: 11px; display: block; color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .balance-display { background: #000; padding: 4px 12px; border-radius: 20px; border: 1px solid #333; color: var(--green); font-weight: bold; font-size: 14px; }
        .menu-icon { font-size: 20px; cursor: pointer; color: #aaa; }

        /* কন্টেন্ট এরিয়া */
        .container { padding: 10px; }
        .history { display: flex; gap: 8px; padding-bottom: 10px; overflow-x: auto; }
        .history span { background: #222; padding: 2px 8px; border-radius: 10px; color: #bc82ff; font-size: 11px; border: 1px solid var(--border); }
        
        #game-box { background: #141414; height: 180px; border-radius: 15px; position: relative; border: 1px solid #282828; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #multiplier { font-size: 45px; font-weight: 900; z-index: 5; }
        canvas { position: absolute; width: 100%; height: 100%; }

        .bet-card { background: var(--panel); border-radius: 15px; padding: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .tabs { display: flex; background: #000; border-radius: 20px; padding: 2px; margin-bottom: 10px; }
        .tab { flex: 1; text-align: center; font-size: 12px; padding: 5px; border-radius: 20px; cursor: pointer; color: #888; }
        .active-tab { background: #333; color: #fff; }

        .panel-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; align-items: center; }
        .amount-section { display: flex; flex-direction: column; gap: 5px; }
        .input-box { background: #000; border-radius: 8px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; }
        .input-box button { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .q-btn { background: #222; border: 1px solid var(--border); color: #fff; font-size: 11px; padding: 5px; border-radius: 5px; }

        .main-btn { width: 100%; height: 100%; background: var(--green); border: none; color: #fff; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .cashout { background: var(--yellow); color: #000; }

        .auto-settings { display: none; grid-column: span 2; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        .auto-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #aaa; margin-bottom: 5px; }
        .toggle { width: 30px; height: 14px; background: #444; border-radius: 10px; position: relative; }
        .toggle.on { background: var(--green); }
        .toggle::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 1px; left: 1px; transition: 0.2s; }
        .toggle.on::after { left: 17px; }
        .val-box { background: #000; border: 1px solid #444; padding: 2px 8px; border-radius: 5px; color: #fff; }

        .live-bets { margin-top: 20px; background: #111; border-radius: 10px; padding: 10px; border: 1px solid #222; }
        .bet-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        .bet-table th { color: #777; padding-bottom: 8px; border-bottom: 1px solid #222; }
        .bet-table td { padding: 8px 0; border-bottom: 1px solid #1a1a1a; color: #bbb; }
        .win-txt { color: var(--green); font-weight: bold; }
    </style>
</head>
<body>
    <audio id="s-click" src="click.mp3" preload="auto"></audio>
    <audio id="s-fly" src="helicopter.mp3" preload="auto" loop></audio>
    <audio id="s-crash" src="crash.mp3" preload="auto"></audio>

    <!-- মেনুবার -->
    <nav class="navbar">
        <div class="logo-box">
            <b>BETLOVER24</b>
            <span>Aviator</span>
        </div>
        <div class="nav-right">
            <div class="balance-display">170.00 BDT</div>
            <div class="menu-icon">☰</div>
        </div>
    </nav>

    <div class="container">
        <div class="history">
            <span>1.20x</span> <span style="color:#ff0044">5.40x</span> <span>2.11x</span> <span>1.05x</span>
        </div>

        <div id="game-box">
         <canvas id="canvas" width="400" height="180"></canvas>
   
            <div id="multiplier">1.00x</div>
        </div>
<div class="bet-card" id="p1">
    <div class="tabs">
        <div class="tab active-tab" onclick="toggleTab(1, 'bet')">Bet</div>
        <div class="tab" onclick="toggleTab(1, 'auto')">Auto</div>
    </div>
    <div class="panel-layout">
        <div class="amount-section">
            <div class="input-box">
                <button onclick="changeAmt(1, -5)">-</button>
                <b id="amt-1">100</b>
                <button onclick="changeAmt(1, 5)">+</button>
            </div>
            <div class="grid-btns">
                <button class="q-btn" onclick="setAmt(1, 50)">50</button>
                <button class="q-btn" onclick="setAmt(1, 100)">100</button>
            </div>
        </div>
        <button class="main-btn" id="btn-1" onclick="handleAction(1)">BET</button>
    </div>
    <!-- প্যানেল ১ এর অটো সেটিংস -->
    <div id="auto-1" class="auto-settings" style="display: none;">
        <div class="auto-row">Auto Bet <div class="toggle" onclick="toggleAuto(1, 'bet')"></div></div>
        <div class="auto-row">Auto Cashout 
            <div style="display:flex; align-items:center; gap:5px;">
                <div class="toggle" onclick="toggleAuto(1, 'cashout')"></div> 
                <div class="val-box" id="auto-val-1" onclick="setAutoValue(1)">2.00x</div>
            </div>
        </div>
    </div>
</div>
<div class="bet-card" id="p2">
    <div class="tabs">
        <div class="tab active-tab" onclick="toggleTab(2, 'bet')">Bet</div>
        <div class="tab" onclick="toggleTab(2, 'auto')">Auto</div>
    </div>
    <div class="panel-layout">
        <div class="amount-section">
            <div class="input-box">
                <button onclick="changeAmt(2, -5)">-</button>
                <b id="amt-2">1020</b>
                <button onclick="changeAmt(2, 5)">+</button>
            </div>
            <div class="grid-btns">
                <button class="q-btn" onclick="setAmt(2, 500)">500</button>
                <button class="q-btn" onclick="setAmt(2, 1000)">1000</button>
            </div>
        </div>
        <button class="main-btn" id="btn-2" onclick="handleAction(2)">BET</button>
    </div>
    <!-- প্যানেল ২ এর অটো সেটিংস -->
    <div id="auto-2" class="auto-settings" style="display: none;">
        <div class="auto-row">Auto Bet <div class="toggle" onclick="toggleAuto(2, 'bet')"></div></div>
        <div class="auto-row">Auto Cashout 
            <div style="display:flex; align-items:center; gap:5px;">
                <div class="toggle" onclick="toggleAuto(2, 'cashout')"></div> 
                <div class="val-box" id="auto-val-2" onclick="setAutoValue(2)">2.00x</div>
            </div>
        </div>
    </div>
</div>

        <!-- প্লেয়ার লিস্ট টেবিল -->
        <div class="live-bets">
            <table class="bet-table">
                <thead>
                    <tr><th>PLAYER</th><th>BET BDT</th><th>WIN BDT</th></tr>
                </thead>
                <tbody id="bet-history">
                    <tr><td>User_421</td><td>100.00</td><td>-</td></tr>
                    <tr><td>Aviator_Pro</td><td>500.00</td><td class="win-txt">1250.00</td></tr>
                    <tr><td>Player_99</td><td>1000.00</td><td class="win-txt">1500.00</td></tr>
                </tbody>
            </table>
        </div>
    </div>
        
   <script>
      const planeImg = new Image();
planeImg.src = 'helicopter.png';
const blastImg = new Image();
blastImg.src = 'explosion.png'; 
 let hoverStep = 0;

    // ১. গ্লোবাল ভেরিয়েবল
    let isBetting = false;
    let currentBetAmount = 0;
    let isAutoBet1 = false;
    let isAutoCashout1 = false;
    let autoCashoutValue1 = 2.00;
    let targetMultiplier = 1.00; 
    let displayMultiplier = 1.00;
    let isCrashed = false;

    const mText = document.getElementById('multiplier');
    const balanceDisplay = document.querySelector('.balance-display');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    async function updateGame() {
        try {
            const response = await fetch('/api/game-data');
            const data = await response.json();
            
            // সার্ভার থেকে আসা ভ্যালুগুলো গ্লোবাল ভেরিয়েবলে রাখা (রেন্ডার হবে আলাদা লুপে)
            targetMultiplier = parseFloat(data.multiplier);
            isCrashed = (data.is_crashed == 1);

            // ব্যালেন্স আপডেট
            if (balanceDisplay && data.balance) {
                balanceDisplay.innerText = parseFloat(data.balance).toFixed(2) + " BDT";
            }

            // ১. ক্রাশ হলে বাটন এবং সাউন্ড রিসেট
            if (isCrashed) {
                if (isBetting) {
                    isBetting = false;
                    document.querySelectorAll('.main-btn').forEach(btn => {
                        btn.innerText = "BET";
                        btn.classList.remove('cashout');
                    });
                }
                // ক্রাশ সাউন্ড লজিক
                const flyS = document.getElementById('s-fly');
                const crashS = document.getElementById('s-crash');
                if (flyS) { flyS.pause(); flyS.currentTime = 0; }
                if (crashS) crashS.play().catch(e => {});

                // ৫ সেকেন্ড পর অটো বেট চেক
                if (isAutoBet1 && !isBetting) {
                    setTimeout(() => { if(isAutoBet1) handleAction(1); }, 5000);
                }
            } else {
                // ২. প্লেন ওড়ার সাউন্ড লজিক
                const flyS = document.getElementById('s-fly');
                if (flyS && flyS.paused && targetMultiplier > 1.05) {
                    flyS.play().catch(e => {});
                }
                
                // ৩. অটো ক্যাশআউট চেক
                if (isBetting && isAutoCashout1 && targetMultiplier >= autoCashoutValue1) {
                    handleAction(1);
                }
            }
        } catch (error) { console.log("Sync error..."); }
    }

function drawCurve(val, crashed) {
    if (!canvas) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // ১. ডাইনামিক স্কেলিং ও বেস পজিশন
    let maxX = canvas.width - 70;  
    let maxY = canvas.height - 70; 
    let endX = Math.min(val * (canvas.width / 12), maxX);
    let endY = Math.max(canvas.height - 35 - (val * (canvas.height / 18)), 45);

    // ঢেউয়ের মান (Wave Offset)
    hoverStep += 0.08;
    let waveOffset = Math.sin(hoverStep) * 10; // এটিই ঢেউ তৈরি করবে

    // ২. লাল কার্ভ লাইন আঁকা (পুরো লাইন ঢেউ খেলবে)
    ctx.beginPath();
    ctx.strokeStyle = crashed ? "#555" : "#ff0044";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.moveTo(0, canvas.height - 35);
    
    // কন্ট্রোল পয়েন্ট এবং এন্ড পয়েন্টে ঢেউ যোগ করা
    let ctrlX = endX / 2;
    let ctrlY = (canvas.height - 35 + (crashed ? 0 : waveOffset)); 
    let currentEndY = endY + (crashed ? 0 : waveOffset);

    ctx.quadraticCurveTo(ctrlX, ctrlY, endX, currentEndY);
    ctx.stroke();

    // ৩. হেলিকপ্টার এনিমেশন (লাইনের মাথার সাথে ঢেউ খেলবে)
    if (!crashed && planeImg.complete) {
        const size = 80;
        let planeX = endX - (size / 2);
        let planeY = currentEndY - (size / 2);
        
        // বাউন্ডারি লক (বক্সের বাইরে যাবে না)
        planeX = Math.max(5, Math.min(planeX, canvas.width - size - 5));
        planeY = Math.max(5, Math.min(planeY, canvas.height - size - 5));
        
        ctx.drawImage(planeImg, planeX, planeY, size, size);
    } else if (crashed && blastImg.complete) {
        const bSize = 90;
        ctx.drawImage(blastImg, endX - bSize/2, endY - bSize/2, bSize, bSize);
    }
}

  
  
    // ৪. বেটিং ও ক্যাশআউট বাটন ফাংশন
    async function handleAction(id) {
        const btn = document.getElementById('btn-' + id);
        const amtLabel = document.getElementById('amt-' + id);
        const currentMult = parseFloat(mText.innerText);

        if (!isBetting) {
            currentBetAmount = parseInt(amtLabel.innerText);
            try {
                const res = await fetch('/api/place-bet', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: currentBetAmount })
                });
                const data = await res.json();
                if (data.success) {
                    isBetting = true;
                    btn.innerText = "CASH OUT";
                    btn.classList.add('cashout');
                } else { alert(data.message); }
            } catch(e) { console.log("Bet Error"); }
        } else {
            try {
                const res = await fetch('/api/cashout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: currentBetAmount, multiplier: currentMult })
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerText = "BET";
                    btn.classList.remove('cashout');
                    isBetting = false;
                    alert("বিজয়ী! আপনি পেয়েছেন: " + data.win + " BDT");
                }
            } catch(e) { console.log("Cashout Error"); }
        }
    }

function toggleTab(p, type) {
    const card = document.getElementById(`p${p}`);
    const tabs = card.querySelectorAll('.tab');
    const autoSettings = document.getElementById(`auto-${p}`);

    // ট্যাব হাইলাইট পরিবর্তন
    tabs.forEach(t => t.classList.remove('active-tab'));
    if (type === 'bet') {
        tabs[0].classList.add('active-tab');
        autoSettings.style.display = 'none'; // বেট মোডে অটো সেটিংস লুকাবে
    } else {
        tabs[1].classList.add('active-tab');
        autoSettings.style.display = 'grid'; // অটো মোডে সেটিংস দেখাবে
    }
}

function changeAmt(id, val) {
    // id অনুযায়ী সঠিক প্যানেলের অ্যামাউন্ট এলিমেন্ট ধরা
    let el = document.getElementById('amt-' + id);
    let current = parseInt(el.innerText);
    
    // মিনিমাম ৫ টাকা শর্ত এবং আপডেট লজিক
    if (current + val >= 5) {
        el.innerText = current + val;
    } else {
        el.innerText = 5; // ৫ টাকার নিচে যেতে দিবে না
        alert("মিনিমাম বেট ৫ টাকা");
    }
}

        // ১. কুইক বাটন (১০০, ২০০, ৫০০) সেট করার ফাংশন
        function setAmt(id, val) {
            document.getElementById('amt-' + id).innerText = val;
            document.getElementById('s-click').play(); // ক্লিক সাউন্ড
        }

        // ২. অটো ক্যাশআউট ভ্যালু সেট করার ফাংশন
        function setAutoValue(panel) {
            let newValue = prompt("Enter Auto Cashout Value (e.g. 1.50):", autoCashoutValue1);
            if (newValue && !isNaN(newValue) && newValue >= 1.01) {
                autoCashoutValue1 = parseFloat(newValue);
                let display = document.getElementById('auto-val-' + panel);
                if (display) {
                    display.innerText = autoCashoutValue1.toFixed(2) + "x";
                    document.getElementById('s-click').play(); // ক্লিক সাউন্ড
                }
            }
        }
    // ১. এনিমেশন ইঞ্জিন
function smoothAnimate() {
    if (!isCrashed) {
        // সার্ভারের জন্য অপেক্ষা না করে নিজে থেকেই ০.০১ হারে বাড়তে থাকবে
        // এটি গেমকে থেমে থেমে চলা থেকে বাঁচাবে
        displayMultiplier += 0.01; 

        // যদি ডিসপ্লে ভ্যালু সার্ভারের ভ্যালু থেকে অনেক পিছিয়ে থাকে, তবে দ্রুত সিঙ্ক করবে
        if (displayMultiplier < targetMultiplier) {
            displayMultiplier = targetMultiplier;
        }

        // স্ক্রিনে মাল্টিপ্লায়ার টেক্সট আপডেট
        if (mText) {
            mText.innerText = displayMultiplier.toFixed(2) + "x";
            mText.style.color = "white";
        }
        
        // লাল কার্ভ এবং হেলিকপ্টার ড্র করা
        drawCurve(displayMultiplier, false);
        
    } else {
        // ক্রাশ হলে সরাসরি সার্ভারের ক্রাশ ভ্যালু দেখানো
        displayMultiplier = targetMultiplier;
        if (mText) {
            mText.innerText = "BURSTING!";
            mText.style.color = "red";
        }
        drawCurve(displayMultiplier, true);
    }

    // প্রতি সেকেন্ডে ৬০ বার ছবি আঁকবে (Smooth 60FPS)
    requestAnimationFrame(smoothAnimate);
}

// ২. ইঞ্জিনটি প্রথমবার চালু করা
smoothAnimate();


        // ৩. প্রতি ৫০০ মিলিসেকেন্ডে গেম আপডেট
        setInterval(updateGame, 500);

</script>   
</body>
</html>
