<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETLOVER24 Aviator</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #111;
            --green: #28a745;
            --yellow: #ffc107;
            --red: #ff0044;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: Arial, sans-serif;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 10px 15px;
            border-bottom: 1px solid #222;
        }
        .navbar-brand b { color: var(--red); font-size: 20px; }
        .navbar-brand span { font-size: 12px; color: #aaa; display: block; }
        .balance-display {
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--green);
            display: none !important;

            font-weight: bold;
        }
        .container { padding: 15px; }
        
        /* প্রফেশনাল ক্রাশ হিস্টোরি বক্স ডিজাইন */
        #history-box {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 6px;
            background: #090909;
            border-radius: 6px;
            border: 1px solid #1c1c1c;
            min-height: 24px;
            align-items: center;
        }
        .history-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        #game-box {
            position: relative;
            background: #050505;
            border-radius: 10px;
            height: 200px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #multiplier {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .bet-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #222;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .active-tab { background: #333; font-weight: bold; border: 1px solid #555; }
        .panel-layout { display: flex; gap: 15px; align-items: center; }
        .amount-section { flex: 1; }
        .input-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            padding: 5px;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .input-box button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 30px;
            cursor: pointer;
        }
        .input-box b { font-size: 18px; }
        .grid-btns { display: flex; gap: 5px; }
        .q-btn {
            flex: 1;
            background: #222;
            border: none;
            color: #fff;
            padding: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .main-btn {
            width: 120px;
            height: 75px;
            background: var(--green);
            color: #fff;
            border: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-btn.cashout { background: var(--yellow); color: #000; }
        .auto-settings {
            display: grid;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
         }
        .auto-row { display: flex; justify-content: space-between; align-items: center; }
        .toggle {
            width: 34px;
            height: 18px;
            background: #444;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle.on { background: var(--green); }
        .toggle.on::after { left: 18px; }
        .val-box {
            background: #000;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid #333;
            cursor: pointer;
        }
        .live-bets { margin-top: 20px; background: #0a0a0a; border-radius: 10px; padding: 10px; }
        .bet-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .bet-table th { text-align: left; color: #777; padding: 8px; border-bottom: 1px solid #222; }
        .bet-table td { padding: 8px; border-bottom: 1px solid #111; }
    </style>
    <script src="/socket.io/socket.io.js?v=1.2"></script>
</head>
<body>

    <audio id="s-click" src="click.mp3" preload="auto"></audio>
    <audio id="s-fly" src="helicopter.mp3" preload="auto" loop></audio>
    <audio id="s-crash" src="crash.mp3" preload="auto"></audio>

    <nav>
        <div class="navbar-brand">
            <b>BETLOVER24</b>
            <span>Aviator</span>
        </div>
        

    </nav>

    <div class="container">
        
        <!-- ১. গেম বক্সের ঠিক ওপরে লাইভ হিস্টোরি কন্টেইনার -->
        <div id="history-box"></div>

        <div id="game-box">
            <canvas id="canvas"></canvas>
            
<div id="multiplier">1.00x</div>
<div id="game-timer" style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; color: #ffcc00; display: none; text-shadow: 0 0 8px rgba(255,204,0,0.5);">Next Round In 8.00s</div>

        </div>

        <div class="bet-card" id="p1">
            <div class="tabs">
                <div class="tab active-tab" id="tab-bet" onclick="toggleTab('bet')">Bet</div>
                <div class="tab" id="tab-auto" onclick="toggleTab('auto')">Auto</div>
            </div>
            <div class="panel-layout">
                <div class="amount-section">
                    <div class="input-box">
                        <button onclick="changeAmt(-5)">-</button>
                        <b id="amt-1">100</b>
                        <button onclick="changeAmt(5)">+</button>
                    </div>
                    <div class="grid-btns">
                        <button class="q-btn" onclick="setAmt(50)">50</button>
                        <button class="q-btn" onclick="setAmt(100)">100</button>
                        <button class="q-btn" onclick="setAmt(500)">500</button>
                        <button class="q-btn" onclick="setAmt(1000)">1000</button>
                    </div>
                </div>
                <button class="main-btn" id="btn-1" onclick="handleAction()">BET</button>
            </div>
            
            <div id="auto-settings-panel" class="auto-settings" style="display: none;">
                <div class="auto-row">
                    <span>Auto Bet</span>
                    <div class="toggle" id="toggle-autobet" onclick="toggleAuto('bet')"></div>
                </div>
                <div class="auto-row">
                    <span>Auto Cashout</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="toggle" id="toggle-autocash" onclick="toggleAuto('cashout')"></div>
                        <div class="val-box" id="auto-val-1" onclick="setAutoValue()">2.00x</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="live-bets">
            <table class="bet-table">
                <thead>
                    <tr><th>PLAYER</th><th>BET BDT</th><th>WIN BDT</th></tr>
                </thead>
                <tbody id="player-list">
                    <tr><td>User_421</td><td>100.00</td><td>-</td></tr>
                    <tr><td>Aviator_Pro</td><td>500.00</td><td>1250.00</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
// 🎰 গেম কোর ভেরিয়েবল
const socket = io(); // ডাইনামিক লাইভ সকেট কানেকশন রুট
let isBetting = false;
let isAutoBet = false;

// 🎯 রুট ডিরেক্টরি অনুযায়ী হেলিকপ্টার ও বিস্ফোরণ ইমেজ পাথ ফিক্সড
const planeImg = new Image(); 
planeImg.src = 'helicopter.png'; 

const blastImg = new Image(); 
blastImg.src = 'explosion.png'; 

// 🛡️ ইউআরএল প্যারামিটার থেকে ইউজার আইডি এবং সিলেক্ট করা ওয়ালেট সংগ্রহ
const urlParams = new URLSearchParams(window.location.search);
const urlUserId = urlParams.get('userId') || urlParams.get('username') || "Roky123";
const urlWallet = urlParams.get('wallet') || "main";

// 🚀 বাজি ধরা এবং ক্যাশআউটের মেইন হ্যান্ডলার ফাংশন
async function handleAction() {
    try { document.getElementById('s-click').play(); } catch(e){}
    const btn = document.getElementById('btn-1');
    const amtLabel = document.getElementById('amt-1');
    const currentBetAmount = parseInt(amtLabel.innerText);

    // ডাবল-ক্লিক লক প্রোটোকল: বাজি প্রসেসিং চলাকালীন অতিরিক্ত ক্লিক ব্লক করবে
    if (window.isProcessingBet) return;
    window.isProcessingBet = true;

    if (!urlUserId) {
        window.isProcessingBet = false;
        console.log("Session Expired! Please re-login.");
        return;
    }

    if (!isBetting) {
        try {
            const res = await fetch('/api/place-bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    amount: currentBetAmount,
                    userId: urlUserId,
                    wallet: urlWallet
                })
            });
            const data = await res.json();
            window.isProcessingBet = false; // প্রসেস লক অফ
            
            if (data.success) {
                isBetting = true;
                btn.innerText = "CASH OUT";
                btn.classList.add('cashout');
                
                // 🔄 আইফ্রেম দেয়াল ভেঙে মেইন সাইটের ব্যালেন্স সাথে সাথে মাইনাস করার লাইভ সিগন্যাল
                if (window.parent) {
                    window.parent.postMessage({ action: "refresh_wallet" }, "*");
                }
            } else {
                console.log(data.message || "Bet Declined!");
            }
        } catch (e) { 
            window.isProcessingBet = false;
            console.error("Server Error!"); 
        }
    } else {
        try {
            const res = await fetch('/api/cash-out', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    amount: currentBetAmount,
                    userId: urlUserId,
                    wallet: urlWallet
                })
            });
            const data = await res.json();
            window.isProcessingBet = false; // প্রসেস লক অফ
            
            if (data.success) {
                isBetting = false;
                btn.innerText = "BET";
                btn.classList.remove('cashout');
                console.log("You Won: " + data.winAmount + " BDT");
                
                // 🔄 জিতার পর মেইন সাইটের ব্যালেন্স প্লাস করার লাইভ সিগন্যাল
                if (window.parent) {
                    window.parent.postMessage({ action: "refresh_wallet" }, "*");
                }
            }
        } catch (e) { 
            window.isProcessingBet = false;
            console.error(e); 
        }
    }
}

// 💰 প্লাস-মাইনাস ও কাস্টম অ্যামাউন্ট বাটন ফাংশন
function setAmt(val) {
    document.getElementById('amt-1').innerText = val;
    try { document.getElementById('s-click').play(); } catch(e){}
}

function changeAmt(diff) {
    const amtLabel = document.getElementById('amt-1');
    let current = parseInt(amtLabel.innerText) || 10;
    current = Math.max(10, current + diff);
    amtLabel.innerText = current;
    try { document.getElementById('s-click').play(); } catch(e){}
}

// 🔄 বেট ও অটো প্যানেল ট্যাব পরিবর্তনকারী ফাংশন
function toggleTab(type) {
    const autoPanel = document.getElementById('auto-settings-panel');
    document.getElementById('tab-bet').classList.toggle('active-tab', type === 'bet');
    document.getElementById('tab-auto').classList.toggle('active-tab', type === 'auto');
    
    if (autoPanel) {
        autoPanel.style.display = (type === 'bet') ? 'none' : 'flex';
    }
}

// 📊 লাইভ সকেট গেম আপডেট লিসেনার
socket.on("gameUpdate", (data) => {
    const multLabel = document.getElementById("multiplier-text");
    if (multLabel && data.multiplier) {
        multLabel.innerText = data.multiplier + "x";
    }

    // ক্রাশ বা রাউন্ড শেষ হওয়ার ট্র্যাকিং
    if (data.is_crashed === 1) {
        isBetting = false;
        const btn = document.getElementById('btn-1');
        if (btn) {
            btn.innerText = "BET";
            btn.classList.remove('cashout');
        }
        window.isProcessingBet = false;
    }
});
</script>
</body>
</html>
